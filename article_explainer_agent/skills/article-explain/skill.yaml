id: article-explain-v1
name: article-explain
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Multi-agent article analysis system using LangChain and OpenRouter.
  Coordinates 5 specialist agents to analyze text from different perspectives: technical implementation, summarization, conceptual explanation, analogies, and security vulnerabilities.

# Tags and Modes
tags:
  - article-analysis
  - multi-agent
  - technical-explanation
  - summarization
  - security-analysis

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Explain the following technical article topic using multiple perspectives including developer analysis, summarization, conceptual explanation, analogy creation, and security or vulnerability considerations"
  - "Analyze this article about RAG systems from developer, summarizer, explainer, analogy, and security perspectives"
  - "Provide comprehensive analysis of microservices architecture with code examples, summaries, explanations, analogies, and vulnerability assessment"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Multi-agent article analysis using concurrent specialist agents"
    features:
      - "5 concurrent specialist agents (Developer, Summarizer, Explainer, Analogy Creator, Vulnerability Expert)"
      - "LangChain-based agent orchestration with asyncio.gather"
      - "OpenRouter API integration via ChatOpenAI"
      - "Synthesis agent combines all specialist outputs"
      - "Structured markdown output with labeled sections"
    limitations: "Requires OPENROUTER_API_KEY; text-only input; no streaming; no interactive Q&A"

  secondary_capability:
    supported: false
    planned_version: "2.0.0"
    description: "Not supported by code"

# Requirements
requirements:
  packages:
    - "langchain-core"
    - "langchain-openai"
    - "pydantic"
    - "python-dotenv"
    - "bindu"
  system:
    - "Python 3.12+"
  min_memory_mb: 256

# Performance Metrics
performance:
  avg_processing_time_ms: 20000
  max_concurrent_requests: 1
  memory_per_request_mb: 256
  scalability: vertical

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    Multi-agent system built on LangChain that analyzes article text using 5 specialist agents running concurrently.
    Each agent uses a role-specific prompt template and ChatOpenAI model via OpenRouter.
    Agents run in parallel using asyncio.gather, then a synthesis agent combines outputs into structured markdown.
    Uses temperature=0 for deterministic outputs.

  use_cases:
    when_to_use:
      - "Multi-perspective analysis of technical articles"
      - "Educational content requiring developer, beginner, and analogy perspectives"
      - "Security assessment of technical concepts"
      - "Comprehensive topic explanations with code examples"

    when_not_to_use:
      - "Real-time chat or conversational interfaces"
      - "Non-text content (images, PDFs, videos)"
      - "Interactive Q&A or follow-up questions"
      - "Streaming responses"

  input_structure: |
    JSON-RPC 2.0 message with text in parts array.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [
            {
              "kind": "text",
              "text": "Explain the concept of 'RAG systems' using multiple perspectives..."
            }
          ],
          "kind": "message",
          "messageId": "b3e2f650-5616-49ad-b187-d93cbbE00001",
          "contextId": "b3e2f650-5616-49ad-b187-d93cbbE00002",
          "taskId": "b3e2f650-5616-49ad-b187-d93cbbE00003"
        },
        "skillId": "article-explain-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "b3e2f650-5616-49ad-b187-d93cbbE00003"
    }

  output_format: |
    JSON-RPC 2.0 result with task history and artifacts containing markdown analysis.

    Success Response:
    {
      "jsonrpc": "2.0",
      "id": "b3e2f650-5616-49ad-b187-d93cbbe00003",
      "result": {
        "id": "b3e2f650-5616-49ad-b187-d93cbbe00003",
        "context_id": "b3e2f650-5616-49ad-b187-d93cbbe00002",
        "kind": "task",
        "status": {
          "state": "completed",
          "timestamp": "2026-03-12T09:39:05.731682+00:00"
        },
        "history": [
          {
            "role": "assistant",
            "parts": [
              {
                "kind": "text",
                "text": "### Article Analysis:\n\n# Comprehensive Analysis of [Topic]\n\n## Developer Perspective\n[Technical details, code examples, APIs]\n\n## Summarizer Perspective\n[Concise summary, key points]\n\n## Explainer Perspective\n[Step-by-step explanation]\n\n## Analogy Creator Perspective\n[Real-world analogies]\n\n## Vulnerability Expert Perspective\n[Security risks, mitigation]\n\n## Final Synthesis\n[Combined insights]\n\n---\n*Analysis performed by AI Article Explainer Agent*\n*Specialist inputs: Developer, Summarizer, Explainer, Analogy Creator, Vulnerability Expert*\n*Model: gpt-4o*"
              }
            ]
          }
        ],
        "artifacts": [
          {
            "name": "result",
            "parts": [{"kind": "text", "text": "..."}]
          }
        ]
      }
    }

  error_handling:
    - "Missing content: Returns 'Error: No article content provided in the user message.'"
    - "API key missing: Raises ValueError with OPENROUTER_API_KEY requirement"
    - "Agent errors: Catches exceptions and returns 'Error during article explanation: {error}'"
    - "Individual agent failures: Returns 'Error: {error}' in agent output"
    - "No timeout mechanism in code"
    - "No validation for content length"

  examples:
    - title: "RAG Systems Analysis"
      input:
        parts:
          - kind: "text"
            text: "Explain the following technical article topic using multiple perspectives including developer analysis, summarization, conceptual explanation, analogy creation, and security or vulnerability considerations. Article topic: 'How Retrieval-Augmented Generation (RAG) improves the accuracy of large language models.'"
      output:
        text: |
          ### Article Analysis:

          # Comprehensive Analysis of Retrieval-Augmented Generation (RAG)

          ## Developer Perspective
          Retrieval-Augmented Generation (RAG) leverages advanced technical components to enhance language model capabilities. Key elements include embeddings, vector databases, retrieval pipelines, and integration with large language models (LLMs)...

          ## Summarizer Perspective
          RAG enhances large language models by integrating external data retrieval, improving accuracy and relevance...

          ## Explainer Perspective
          RAG is a technique that combines retrieval systems and generative models to improve the accuracy and relevance of generated content...

          ## Analogy Creator Perspective
          RAG can be likened to a chef using a recipe book to select the right ingredients for a dish...

          ## Vulnerability Expert Perspective
          RAG systems face several security risks, including data leakage, hallucination, injection attacks...

          ## Final Synthesis
          Retrieval-Augmented Generation (RAG) represents a significant advancement in enhancing the capabilities of large language models...

          ---
          *Analysis performed by AI Article Explainer Agent*
          *Specialist inputs: Developer, Summarizer, Explainer, Analogy Creator, Vulnerability Expert*
          *Model: gpt-4o*

    - title: "Microservices Architecture Analysis"
      input:
        parts:
          - kind: "text"
            text: "Explain the concept of 'Microservices Architecture in Modern Cloud Systems' using multiple perspectives..."
      output:
        text: |
          ### Article Analysis:

          # Comprehensive Analysis of Microservices Architecture in Modern Cloud Systems

          ## Developer Perspective
          Microservices architecture involves decomposing applications into smaller, independent services...

          ## Summarizer Perspective
          Microservices architecture breaks down applications into smaller, independent services...

          ## Explainer Perspective
          Microservices architecture is a design approach where software applications are composed of small, independent services...

          ## Analogy Creator Perspective
          Imagine a bustling city where each building has a specific purpose...

          ## Vulnerability Expert Perspective
          Microservices architecture presents several security vulnerabilities...

          ## Final Synthesis
          Microservices architecture offers a flexible and scalable approach to software development...

          ---
          *Analysis performed by AI Article Explainer Agent*
          *Specialist inputs: Developer, Summarizer, Explainer, Analogy Creator, Vulnerability Expert*
          *Model: gpt-4o*

  best_practices:
    for_developers:
      - "Set OPENROUTER_API_KEY environment variable before running"
      - "Use async/await patterns - all agent operations are async"
      - "Handle ValueError for missing API keys"
      - "Expect concurrent execution of 5 specialist agents via asyncio.gather"
      - "Model name defaults to 'gpt-4o' but configurable via MODEL_NAME env var"

    for_orchestrators:
      - "Route multi-perspective article analysis requests to this skill"
      - "Expect 15-25 second processing time for concurrent agent execution"
      - "Skill requires text input in message.parts[0].text format"
      - "Output is structured markdown with 6 sections (5 specialists + synthesis)"
      - "No support for streaming, interactive Q&A, or follow-up questions"
      - "Skill uses temperature=0 for deterministic outputs"

  installation: |
    Install dependencies and set environment variables.

    Required environment variables:
    OPENROUTER_API_KEY=<your-openrouter-api-key>
    MODEL_NAME=gpt-4o  # Optional, defaults to gpt-4o

    Required packages (install via uv or pip):
    - langchain-core
    - langchain-openai
    - pydantic
    - python-dotenv
    - bindu

    Run agent:
    python -m article_explainer_agent

    Server runs on http://127.0.0.1:3773 by default.

  versioning:
    - version: "1.0.0"
      date: "2026-03-12"
      changes: "Initial release with 5 concurrent specialist agents using LangChain and OpenRouter"
    - version: "1.1.0"
      status: "planned"
      changes: "Not supported by code"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "article"
    - "explain"
    - "analysis"
    - "perspectives"
    - "developer"
    - "summarize"
    - "analogy"
    - "vulnerability"
    - "security"
    - "multi-agent"
    - "technical"

  specializations:
    - domain: "multi-perspective-analysis"
      confidence_boost: 0.4
    - domain: "technical-article-analysis"
      confidence_boost: 0.3
    - domain: "educational-explanation"
      confidence_boost: 0.2

  anti_patterns:
    - "Real-time chat or conversation"
    - "Interactive Q&A or follow-up questions"
    - "Non-text content (images, PDFs, videos)"
    - "Streaming responses"
    - "Single-perspective analysis"

  complexity_indicators:
    simple:
      - "Not supported - always runs all 5 agents"
    medium:
      - "Standard multi-perspective article analysis"
      - "Technical concept explanation with all 5 specialists"
    complex:
      - "Long-form technical articles requiring comprehensive analysis"
      - "Complex topics needing developer, educational, and security perspectives"
