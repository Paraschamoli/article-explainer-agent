id: article-explain-v1
name: article-explain
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  AI-powered article explanation skill that combines multiple specialist perspectives to provide comprehensive analysis of technical articles.
  Features code examples, summaries, detailed explanations, analogies, and critical analysis from 5 specialized agents.

# Tags and Modes
tags:
  - article-explanation
  - technical-analysis
  - code-examples
  - summarization
  - analogies
  - critical-analysis

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Explain this technical article with code examples"
  - "Summarize this article and provide analogies for complex concepts"
  - "Analyze this article for potential vulnerabilities and methodological issues"
  - "Provide a detailed explanation with code samples for the key concepts"
  - "Give me a TL;DR with technical details and critical analysis"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Comprehensive article explanation using multi-agent approach"
    features:
      - "Code examples and technical implementations"
      - "Concise summaries and TL;DR responses"
      - "Step-by-step educational explanations"
      - "Relatable analogies for complex concepts"
      - "Critical analysis of arguments and methodology"
    limitations: "Requires article text input; processing time depends on content length"

  secondary_capability:
    supported: false
    planned_version: "2.0.0"
    description: "Real-time document processing and interactive Q&A"

# Requirements
requirements:
  packages:
    - "langchain"
    - "langchain-openai"
    - "langchain-core"
    - "pydantic"
    - "python-dotenv"
  system:
    - "Python 3.8+"
  min_memory_mb: 512

# Performance Metrics
performance:
  avg_processing_time_ms: 5000
  max_concurrent_requests: 5
  memory_per_request_mb: 512
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    The article explanation skill uses a multi-agent architecture to analyze technical articles from different perspectives.
    Five specialized agents work concurrently: Developer provides code examples, Summarizer creates concise overviews,
    Explainer delivers detailed educational content, Analogy Creator creates relatable comparisons, and Vulnerability Expert
    provides critical analysis. The results are synthesized into a comprehensive response.

  use_cases:
    when_to_use:
      - "Understanding complex technical articles and research papers"
      - "Getting code examples for technical concepts"
      - "Learning difficult topics through analogies and step-by-step explanations"
      - "Critical analysis of article content and methodology"
      - "Creating educational content from technical documentation"

    when_not_to_use:
      - "Real-time conversation or chat interactions"
      - "Analysis of non-text content (images, videos)"
      - "Very short content (less than 100 words)"
      - "Non-technical or creative writing analysis"

  input_structure: |
    Accepts article content as plain text or JSON.

    Example:
    {
      "article_content": "Your technical article text here...",
      "focus_areas": ["code_examples", "summarization", "analogies"]
    }

    Constraints:
    - Article content should be at least 100 words
    - Maximum recommended length: 10,000 words
    - Supports technical and academic content

  output_format: |
    Comprehensive analysis combining all specialist perspectives.

    Success Response:
    {
      "success": true,
      "result": {
        "analysis": "Combined specialist analysis with sections for summary, explanation, code examples, analogies, and critical review",
        "metadata": {
          "processing_time_ms": 5000,
          "specialists_involved": ["Developer", "Summarizer", "Explainer", "AnalogyCreator", "VulnerabilityExpert"]
        }
      }
    }

    Error Response:
    {
      "success": false,
      "error": {
        "code": "INVALID_INPUT",
        "message": "Article content is required and must be at least 100 characters"
      }
    }

  error_handling:
    - "Invalid input: Returns clear error message for missing or too short content"
    - "API failures: Graceful degradation with partial results when possible"
    - "Timeout behavior: 30-second timeout with partial analysis warning"
    - "Validation errors: Specific guidance on input requirements"
    - "Resource limit handling: Queue system for concurrent request management"

  examples:
    - title: "Technical Article Analysis"
      input:
        article_content: "Machine learning models require careful feature engineering and hyperparameter tuning..."
        focus_areas: ["code_examples", "explanation"]
      output:
        success: true
        result:
          analysis: "### Summary\n\n- Machine learning requires feature engineering and tuning...\n\n### Code Examples\n\n```python\n# Feature engineering example\nfrom sklearn.preprocessing import StandardScaler\n```"
        metadata:
          processing_time_ms: 4500

    - title: "Research Paper Explanation"
      input:
        article_content: "Recent advances in transformer architecture have revolutionized NLP..."
      output:
        success: true
        result:
          analysis: "### Summary\n\n- Transformers revolutionized NLP...\n\n### Analogies\n\nTransformers are like a team of expert translators..."
        metadata:
          processing_time_ms: 5200

  best_practices:
    for_developers:
      - "Ensure proper error handling for API failures"
      - "Implement timeout mechanisms for long articles"
      - "Use async patterns for concurrent agent execution"
      - "Cache results for repeated requests"

    for_orchestrators:
      - "Route technical article analysis requests to this skill"
      - "Chain with document preprocessing skills for PDF handling"
      - "Consider load balancing for concurrent requests"
      - "Monitor processing times and implement retry logic"
      - "Use skill for educational content creation workflows"

  installation: |
    No additional installation required beyond the main agent dependencies.

    Required packages are included in the main agent setup:
    - langchain and langchain-openai for LLM integration
    - pydantic for data validation
    - python-dotenv for environment management

  versioning:
    - version: "1.0.0"
      date: "2024-01-01"
      changes: "Initial release with 5 specialist agents"
    - version: "1.1.0"
      status: "planned"
      changes: "Enhanced code example generation and interactive Q&A"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "article explanation"
    - "technical analysis"
    - "code examples"
    - "summarization"
    - "educational content"
    - "analogy creation"
    - "critical analysis"
    - "multi-agent"

  specializations:
    - domain: "technical_documentation"
      confidence_boost: 0.4
    - domain: "research_papers"
      confidence_boost: 0.3
    - domain: "educational_content"
      confidence_boost: 0.3

  anti_patterns:
    - "General chat conversation"
    - "Creative writing assistance"
    - "Non-technical content analysis"
    - "Real-time Q&A sessions"

  complexity_indicators:
    simple:
      - "Short article summary request"
      - "Basic code example request"
    medium:
      - "Detailed explanation with analogies"
      - "Multi-section analysis"
    complex:
      - "Comprehensive analysis with all specialists"
      - "Critical methodology review"
      - "Advanced technical concept explanation"
